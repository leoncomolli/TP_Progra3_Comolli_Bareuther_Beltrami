<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Tarjetas - Ingreso</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
            box-sizing: border-box;
        }

        .login-container {
            width: min(960px, 100%);
        }

        .login-panel {
            display: grid;
            grid-template-columns: minmax(260px, 1fr) minmax(320px, 460px);
            gap: 28px;
            align-items: stretch;
        }

        .login-brand,
        .login-card {
            background-color: #ffffff;
            border: 1px solid #d8e0ea;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(18, 37, 63, 0.08);
        }

        .login-brand {
            padding: 40px 36px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: linear-gradient(180deg, #ffffff 0%, #f5f8fb 100%);
        }

        .login-eyebrow {
            margin: 0 0 12px;
            color: #526377;
            font-size: 0.95rem;
        }

        .login-brand h1 {
            margin: 0 0 14px;
            color: #17375e;
            font-size: 2.3rem;
        }

        .login-lead {
            margin: 0;
            color: #415468;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .login-card {
            padding: 36px;
        }

        .login-card h2 {
            margin: 0 0 10px;
            color: #17375e;
            font-size: 1.8rem;
        }

        .login-subtitle {
            margin: 0 0 24px;
            color: #526377;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .login-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 16px;
        }

        .form-field label {
            display: block;
            margin-bottom: 8px;
            color: #526377;
            font-size: 0.78rem;
            font-weight: bold;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .form-control {
            width: 100%;
            padding: 13px 14px;
            box-sizing: border-box;
            border: 1px solid #cfd9e4;
            border-radius: 10px;
            background-color: #f9fbfc;
            color: #243447;
            font: inherit;
        }

        .form-control:focus {
            outline: none;
            border-color: #17375e;
            box-shadow: 0 0 0 3px rgba(23, 55, 94, 0.12);
        }

        .login-submit {
            width: 100%;
            padding: 12px 18px;
            border: none;
            border-radius: 999px;
            background-color: #17375e;
            color: #ffffff;
            font: inherit;
            font-weight: bold;
            cursor: pointer;
        }

        .login-submit:hover {
            background-color: #214977;
        }

        .login-register-link {
            margin: 22px 0 0;
            text-align: center;
            font-size: 0.9rem;
        }

        .login-register-link a {
            color: #17375e;
            text-decoration: none;
            font-weight: bold;
        }

        .login-register-link a:hover {
            text-decoration: underline;
        }

        .login-footer {
            margin-top: 18px;
            text-align: center;
            color: #6a7a8b;
            font-size: 0.75rem;
        }

        @media (max-width: 860px) {
            .login-panel {
                grid-template-columns: 1fr;
            }

            .login-brand,
            .login-card {
                padding: 28px 22px;
            }
        }

        @media (max-width: 700px) {
            .login-shell {
                padding: 20px 12px;
            }

            .login-brand h1 {
                font-size: 1.9rem;
            }

            .login-card h2 {
                font-size: 1.5rem;
            }

            .login-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="page-shell login-shell">
        <div class="login-container">
            <section class="login-panel">
                <div class="login-brand">
                    <p class="login-eyebrow">Portal Progra3Card</p>
                    <h1>Mis Tarjetas</h1>
                    <p class="login-lead">Consult&aacute; tus liquidaciones en tiempo real.</p>
                </div>

                <div class="login-card">
                    <h2>Ingresar a tu cuenta</h2>
                    <p class="login-subtitle">Complet&aacute; los datos para acceder al portal.</p>

                    <form action="ingreso.php" method="POST" class="login-form">
                        <div class="login-grid">
                            <div class="form-field">
                                <label for="tipo-doc">Tipo de doc.</label>
                                <select id="tipo-doc" name="tipo_doc" class="form-control">
                                    <option value="DNI">DNI</option>
                                    <option value="PASAPORTE">Pasaporte</option>
                                </select>
                            </div>
                            <div class="form-field">
                                <label for="documento">Documento</label>
                                <input id="documento" type="text" name="documento" required class="form-control">
                            </div>
                        </div>

                        <div class="form-field">
                            <label for="usuario">Usuario Web</label>
                            <input id="usuario" type="text" name="usuario" required class="form-control">
                        </div>

                        <div class="form-field">
                            <label for="password">Contrase&ntilde;a</label>
                            <input id="password" type="password" name="password" required class="form-control">
                        </div>

                        <button type="submit" name="ingresar" class="login-submit">
                            Ingresar
                        </button>
                    </form>

                    <p class="login-register-link"><a href="registro.html">&iquest;No ten&eacute;s una cuenta? Registrate</a></p>
                </div>
            </section>

            <footer class="login-footer">
                Portal Oficial de Consultas de Liquidaciones Progra3card.
            </footer>
        </div>
    </main>
</body>
</html>
